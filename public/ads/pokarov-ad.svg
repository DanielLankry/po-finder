<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAF7"/>
      <stop offset="100%" style="stop-color:#F0FDF4"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bgGrad)"/>

  <!-- Subtle map pins pattern -->
  <g opacity="0.08">
    <circle cx="200" cy="150" r="8" fill="#059669"/>
    <circle cx="300" cy="200" r="6" fill="#059669"/>
    <circle cx="150" cy="300" r="7" fill="#059669"/>
    <circle cx="850" cy="120" r="8" fill="#059669"/>
    <circle cx="950" cy="250" r="6" fill="#059669"/>
    <circle cx="1050" cy="180" r="7" fill="#059669"/>
    <circle cx="900" cy="350" r="8" fill="#059669"/>
    <circle cx="1000" cy="450" r="6" fill="#059669"/>
  </g>

  <!-- Stylized Israel map outline (simplified) -->
  <g fill="none" stroke="#059669" stroke-width="2" opacity="0.15">
    <path d="M600,80 L750,100 L850,150 L900,250 L850,400 L750,500 L650,520 L550,450 L500,350 L520,250 L580,150 Z"/>
  </g>

  <!-- Tel Aviv highlight circle -->
  <circle cx="780" cy="280" r="45" fill="none" stroke="#059669" stroke-width="3" opacity="0.4"/>
  <circle cx="780" cy="280" r="25" fill="#059669" opacity="0.2"/>

  <!-- Vendor icons scattered around Tel Aviv -->
  <g font-size="24" fill="#059669">
    <text x="740" y="260">☕</text>
    <text x="800" y="290">🍔</text>
    <text x="770" y="320">🛒</text>
    <text x="820" y="260">🥯</text>
    <text x="750" y="300">🍕</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#111111" dir="rtl">
    <tspan x="80" dy="0">מצאו עסקים לידכם</tspan>
    <tspan x="80" dy="70" font-size="42" fill="#666666">— בלי אפליקציה, בלי סיבוך</tspan>
  </text>

  <!-- Subheadline -->
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="26" fill="#059669" font-weight="600" dir="rtl">
    פוקרוב.פו — מפה חיה של עסקים מקומיים בישראל
  </text>

  <!-- CTA Button -->
  <rect x="80" y="390" width="200" height="56" rx="28" fill="url(#btnGrad)"/>
  <text x="180" y="430" font-family="Arial, sans-serif" font-size="20" fill="white" font-weight="bold" text-anchor="middle" dir="rtl">
    גלו עכשיו
  </text>

  <!-- URL -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="18" fill="#888888" dir="rtl">
    pokarov.co.il
  </text>

  <!-- Brand logo placeholder -->
  <text x="1120" y="580" font-family="Arial, sans-serif" font-size="20" fill="#059669" font-weight="bold" text-anchor="end">
    פוקרוב
  </text>
</svg>